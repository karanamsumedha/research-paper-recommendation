# ============================================
# Spring Boot Application Configuration
# ============================================
spring.application.name=research-paper-recommendation
spring.profiles.active=dev

# ============================================
# PostgreSQL Database Configuration
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/research_paper_db
spring.datasource.username=postgres
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA/Hibernate Configuration
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ============================================
# Server Configuration
# ============================================
server.port=8080
server.servlet.context-path=/api
server.error.include-message=always
server.error.include-binding-errors=always

# ============================================
# JWT Configuration
# ============================================
jwt.secret=your_super_secret_jwt_key_change_this_in_production_12345
jwt.expiration=86400000
jwt.token.prefix=Bearer 
jwt.header.string=Authorization

# ============================================
# Logging Configuration
# ============================================
logging.level.root=INFO
logging.level.com.researchpaper=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ============================================
# Application Details
# ============================================
app.name=Research Paper Recommendation Platform
app.version=1.0.0
app.description=A comprehensive platform for searching, recommending, and managing research papers with citations

# ============================================
# File Upload Configuration
# ============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================
# Actuator Configuration (Optional)
# ============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always